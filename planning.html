<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intr'Aladin - Planning</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bleu-nuit': '#0B132B', 'or': '#F59E0B' },
                    fontFamily: { 'aladin': ['"Aladin"', 'cursive'], 'sans': ['ui-sans-serif', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-32 md:pb-0 font-sans">

    <header class="bg-gradient-to-r from-bleu-nuit to-indigo-900 text-white p-4 flex justify-between items-center rounded-b-3xl md:rounded-none shadow-md">
        <img src="logo intra.png" alt="Logo Intras" class="w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
        <div class="text-center">
            <h1 class="text-4xl font-aladin tracking-widest text-or mt-2">INTR'ALADIN</h1>
            <p class="text-xs text-gray-300">Du 18 mai au 11 juin</p>
        </div>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
            <a href="index.html" class="hover:text-or transition-colors">Accueil</a>
            <a href="planning.html" class="text-or">Planning</a>
            <a href="equipes.html" class="hover:text-or transition-colors">Équipes</a>
            <a href="staff.html" class="hover:text-or transition-colors">Staff</a>
            <a href="classements.html" class="hover:text-or transition-colors">Classements</a>
        </div>
        <img src="logo_mads.png" alt="Logo Mads" class="md:hidden w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
    </header>

    <main class="p-4 mt-4 space-y-6 max-w-4xl mx-auto">
        <section class="flex flex-col gap-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                <h2 class="font-bold text-xl text-bleu-nuit">PLANNING DES MATCHS</h2>
                <div class="grid grid-cols-3 gap-2 w-full md:w-auto">
                    <select id="filtre-date" onchange="filtrerMatchs()" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs sm:text-sm rounded-lg focus:ring-or focus:border-or block w-full p-2.5">
                        <option value="Toutes" selected>Dates</option>
                    </select>
                    <select id="filtre-poule" onchange="filtrerMatchs()" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs sm:text-sm rounded-lg focus:ring-or focus:border-or block w-full p-2.5">
                        <option value="Toutes" selected>Poules</option>
                    </select>
                    <select id="filtre-sport" onchange="filtrerMatchs()" class="bg-gray-50 border border-gray-300 text-gray-900 text-xs sm:text-sm rounded-lg focus:ring-or focus:border-or block w-full p-2.5">
                        <option value="Toutes" selected>Sports</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg px-3 py-2">
                <span class="text-gray-400 mr-2 text-lg">🔍</span>
                <input type="text" id="recherche-equipe" onkeyup="filtrerMatchs()" placeholder="Rechercher une équipe..." 
                       class="w-full bg-transparent border-none focus:ring-0 text-gray-700 outline-none text-sm">
            </div>
        </section>

        <section id="matchs-container" class="space-y-4">
            <p class="text-center text-gray-400 animate-pulse">Chargement du planning...</p>
        </section>
    </main>

    <div id="modal-details" class="hidden fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-bleu-nuit text-white">
                <h3 id="modal-details-titre" class="font-bold uppercase tracking-wider text-sm md:text-base">Détails du match</h3>
                <button onclick="fermerModalDetails()" class="text-2xl hover:text-or transition-colors leading-none pb-1">&times;</button>
            </div>
            <div class="p-4 overflow-y-auto space-y-2 bg-gray-50" id="liste-details-matchs">
            </div>
        </div>
    </div>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🏠</span><span class="text-[10px] mt-1">ACCUEIL</span></a>
        <a href="planning.html" class="flex flex-col items-center text-or"><span class="text-xl">📅</span><span class="text-[10px] font-bold mt-1">PLANNING</span></a>
        <a href="equipes.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">👥</span><span class="text-[10px] mt-1">ÉQUIPES</span></a>
        <a href="staff.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🦺</span><span class="text-[10px] mt-1">STAFF</span></a>
        <a href="classements.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🏆</span><span class="text-[10px] mt-1 uppercase">CLASSEMENTS</span></a>    
    </nav>

    <script>
        const lienGoogleSheet = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS4HyMZ9cf-z5kWEIc_8G07U2uHUR5TFjArrRc1VzoXN_-p-jHAso-6S2g60FxUas9KoyLT7o_ZTWPq/pub?output=csv';
        const lienDetailsMatchs = '🚨 METS LE LIEN DE TON NOUVEAU SHEET ICI 🚨';

        let tousLesMatchs = [];
        let tousLesDetails = [];

        // LE NOUVEAU TRADUCTEUR BLINDÉ
        function traduireEmojiEnSport(texte) {
            if (!texte) return "";
            if (texte.includes("🏀")) return "basketball";
            if (texte.includes("🤾")) return "handball";
            if (texte.includes("⚽")) return "football";
            if (texte.includes("🥏")) return "ultimate";
            if (texte.includes("🏐")) return "volleyball";
            if (texte.includes("🥎") || texte.includes("🎳") || texte.includes("🎯")) return "pétanque";
            return texte.toLowerCase().trim();
        }

        async function chargerMatchs() {
            const container = document.getElementById('matchs-container');
            try {
                const reponse = await fetch(lienGoogleSheet);
                const donneesBrutes = await reponse.text();
                const lignes = donneesBrutes.split('\n');
                
                tousLesMatchs = []; 
                let datesDisponibles = new Set(); 
                let poulesDisponibles = new Set(); 
                let sportsDisponibles = new Set();

                for (let i = 1; i < lignes.length; i++) {
                    const colonnes = lignes[i].split(',');

                    if (colonnes.length >= 7 && colonnes[0].trim() !== "") {
                        const match = {
                            date: colonnes[0] ? colonnes[0].trim() : "",
                            heure: colonnes[1] ? colonnes[1].trim() : "",
                            sport: colonnes[2] ? colonnes[2].trim() : "",
                            poule: colonnes[3] ? colonnes[3].trim() : "",
                            eq1: colonnes[4] ? colonnes[4].trim() : "", 
                            eq2: colonnes[5] ? colonnes[5].trim() : "",
                            lieu: colonnes[6] ? colonnes[6].trim() : "",
                            arbitre: colonnes[7] ? colonnes[7].trim() : "" 
                        };
                        tousLesMatchs.push(match);
                        datesDisponibles.add(match.date);
                        poulesDisponibles.add(match.poule);
                        sportsDisponibles.add(match.sport);
                    }
                }

                try {
                    const repDetails = await fetch(lienDetailsMatchs);
                    const csvDetails = await repDetails.text();
                    const lignesDet = csvDetails.split('\n');
                    const sepDet = (lignesDet[0].split(';').length > lignesDet[0].split(',').length) ? ';' : ',';

                    for (let i = 1; i < lignesDet.length; i++) {
                        const col = lignesDet[i].split(sepDet);
                        // Ton nouveau fichier a 7 colonnes : Sport, heure, Poule, Équipe 1, Score 1, Score 2, Équipe 2
                        if(col.length >= 7 && col[0].trim() !== "") {
                            tousLesDetails.push({
                                sport: col[0].trim(),
                                heure: col[1].trim(),
                                poule: col[2].trim(),
                                eq1: col[3].trim(),
                                eq2: col[6].trim()
                            });
                        }
                    }
                } catch (e) { console.log("Fichier détails non chargé."); }

                remplirFiltres(datesDisponibles, poulesDisponibles, sportsDisponibles);
                afficherMatchs(tousLesMatchs);

            } catch (erreur) {
                console.error("Erreur de chargement :", erreur);
                container.innerHTML = '<p class="text-red-500 text-center font-bold">Erreur : Impossible de charger le planning.</p>';
            }
        }

        function remplirFiltres(dates, poules, sports) {
            const selectDate = document.getElementById('filtre-date');
            const selectPoule = document.getElementById('filtre-poule');
            const selectSport = document.getElementById('filtre-sport');
            dates.forEach(date => { selectDate.innerHTML += `<option value="${date}">${date}</option>`; });
            Array.from(poules).sort().forEach(poule => { selectPoule.innerHTML += `<option value="${poule}">Poule ${poule}</option>`; });
            Array.from(sports).sort().forEach(sport => { selectSport.innerHTML += `<option value="${sport}">${sport}</option>`; });
        }

        function afficherMatchs(listeDeMatchs) {
            const container = document.getElementById('matchs-container');
            container.innerHTML = ''; 
            if (listeDeMatchs.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 py-8">Aucun match trouvé pour ces critères.</p>';
                return;
            }

            listeDeMatchs.forEach(match => {
                const affichageArbitre = match.arbitre ? `<span>Arbitre : <span class="font-bold text-gray-700">${match.arbitre}</span></span>` : '';
                const carteHTML = `
                    <div onclick="ouvrirModalDetails('${match.sport}', '${match.poule}')" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col hover:shadow-md transition-shadow cursor-pointer hover:border-or group">
                        <div class="flex items-center">
                            <div class="text-4xl bg-orange-50 w-16 h-16 flex items-center justify-center rounded-full mr-4 border border-orange-100 flex-shrink-0">${match.sport}</div>
                            <div class="flex-grow">
                                <div class="flex justify-between items-start">
                                    <span class="font-bold text-bleu-nuit uppercase">POULE ${match.poule}</span>
                                    <span class="text-xs font-bold text-or bg-orange-50 px-2 py-1 rounded">${match.date} - ${match.heure}</span>
                                </div>
                                <p class="text-sm mt-2 text-gray-700 leading-relaxed"><strong>Équipes :</strong> ${match.eq1}</p>
                                <div class="flex flex-wrap gap-x-4 gap-y-1 mt-2 text-xs text-gray-500">
                                    <span>📍 ${match.lieu}</span>
                                    ${affichageArbitre}
                                </div>
                            </div>
                        </div>
                        <div class="w-full text-center mt-3 pt-2 border-t border-gray-50 text-[10px] text-gray-400 font-bold uppercase tracking-widest group-hover:text-or transition-colors">
                            👉 Cliquez pour voir les horaires détaillés
                        </div>
                    </div>
                `;
                container.innerHTML += carteHTML;
            });
        }

        function filtrerMatchs() {
            const dateChoisie = document.getElementById('filtre-date').value;
            const pouleChoisie = document.getElementById('filtre-poule').value;
            const sportChoisi = document.getElementById('filtre-sport').value;
            const texteRecherche = document.getElementById('recherche-equipe').value.toLowerCase(); 

            const matchsFiltres = tousLesMatchs.filter(match => {
                const dateOk = (dateChoisie === 'Toutes') || (match.date === dateChoisie);
                const pouleOk = (pouleChoisie === 'Toutes') || (match.poule === pouleChoisie);
                const sportOk = (sportChoisi === 'Toutes') || (match.sport === sportChoisi);
                const rechercheOk = match.eq1.toLowerCase().includes(texteRecherche); 
                return dateOk && pouleOk && sportOk && rechercheOk;
            });
            afficherMatchs(matchsFiltres);
        }

        function ouvrirModalDetails(sportEmoji, poule) {
            const sportTexte = traduireEmojiEnSport(sportEmoji);

            document.getElementById('modal-details-titre').innerText = `DÉTAILS : ${sportEmoji} - POULE ${poule}`;
            const container = document.getElementById('liste-details-matchs');
            container.innerHTML = '';

            const detailsFiltres = tousLesDetails.filter(d => 
                d.sport.toLowerCase().includes(sportTexte) && 
                d.poule.toLowerCase() === poule.toLowerCase()
            );

            if (detailsFiltres.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm text-center italic py-4">Aucun détail disponible pour cette poule pour le moment. (Vérifiez le lien CSV !)</p>';
            } else {
                detailsFiltres.forEach(d => {
                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex items-center justify-between hover:bg-gray-50 transition-colors">
                            <div class="text-or font-bold text-sm w-16 flex-shrink-0">${d.heure}</div>
                            <div class="flex-grow flex justify-between items-center text-sm px-2">
                                <span class="font-bold text-gray-800 text-right w-[40%] truncate">${d.eq1}</span>
                                <span class="text-gray-300 text-[10px] mx-2 uppercase">VS</span>
                                <span class="font-bold text-gray-800 text-left w-[40%] truncate">${d.eq2}</span>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('modal-details').classList.remove('hidden');
        }

        function fermerModalDetails() { document.getElementById('modal-details').classList.add('hidden'); }
        document.getElementById('modal-details').addEventListener('click', function(e) { if (e.target === this) fermerModalDetails(); });

        chargerMatchs();
    </script>
</body>
</html>
