    <meta charset="UTF-8">

<body class="bg-gray-50 text-gray-800 pb-32 md:pb-0 font-sans">

    <header class="bg-gradient-to-r from-bleu-nuit to-indigo-900 text-white p-4 flex justify-between items-center rounded-b-3xl md:rounded-none shadow-md">
        <img src="logo intra.png" alt="Logo Intras" class="w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20" onerror="this.style.display='none'">
        <div class="text-center">
            <h1 class="text-4xl font-aladin tracking-widest text-or mt-2">INTR'ALADIN</h1>
            <p class="text-xs text-gray-300">Du 18 mai au 11 juin</p>
        </div>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
            <a href="index.html" class="hover:text-or transition-colors">Accueil</a>
            <a href="planning.html" class="hover:text-or transition-colors">Planning</a>
            <a href="equipes.html" class="hover:text-or transition-colors">Équipes</a>
            <a href="staff.html" class="hover:text-or transition-colors">Staff</a>
            <a href="classements.html" class="text-or">Classements</a>
        </div>
        <img src="logo_mads.png" alt="Logo Mads" class="md:hidden w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20" onerror="this.style.display='none'">

    <main class="p-4 mt-4 space-y-6 max-w-4xl mx-auto">
        <section class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 text-center">
            <h2 class="font-bold text-2xl text-bleu-nuit uppercase tracking-wider">Classements & Résultats</h2>
        </section>

        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
            <label for="filtre-poule" class="font-bold text-bleu-nuit mr-4 flex-shrink-0">Trier par :</label>
            <select id="filtre-poule" onchange="afficherPoules()" class="bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-or focus:border-or block w-full p-2.5 outline-none font-bold uppercase tracking-wider cursor-pointer">
                <option value="Toutes">Toutes les poules</option>
            </select>
        </section>

        <div id="classements-container" class="space-y-10">
            <p class="text-center text-gray-400 animate-pulse">Génération des matchs et calcul des classements...</p>
        </div>
    </main>

    <!-- FENÊTRE POP-UP POUR LES ÉQUIPES -->
    <div id="modal-equipe" class="hidden fixed inset-0 bg-black/60 z-50 flex justify-center items-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-lg overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-bleu-nuit text-white">
                <div class="flex items-center space-x-3">
                    <img id="modal-equipe-logo" src="" class="w-10 h-10 rounded-full object-cover border border-white/30 bg-white" onerror="this.style.display='none'">
                    <h3 id="modal-equipe-nom" class="font-bold uppercase tracking-wider text-sm md:text-base">Nom de l'équipe</h3>
                </div>
                <button onclick="fermerModalEquipe()" class="text-2xl hover:text-or transition-colors leading-none pb-1">&times;</button>
            </div>
            
            <div class="p-4 overflow-y-auto space-y-3 bg-gray-50">
                <h4 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Membres de l'équipe</h4>
                <ul id="liste-joueurs-equipe" class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                </ul>
            </div>
        </div>
    </div>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🏠</span><span class="text-[10px] mt-1">ACCUEIL</span></a>
        <a href="planning.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">📅</span><span class="text-[10px] mt-1">PLANNING</span></a>
        <a href="equipes.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">👥</span><span class="text-[10px] mt-1">ÉQUIPES</span></a>
        <a href="staff.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🦺</span><span class="text-[10px] mt-1">STAFF</span></a>
        <a href="classements.html" class="flex flex-col items-center text-or"><span class="text-xl">🏆</span><span class="text-[10px] font-bold mt-1 uppercase">Classements</span></a>
    </nav>

    <script>
        const lienScores = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSrPajxY5p2VL-Yc0SjGmHHORVuvg_9g5wRXUzQxwSnQ9Q8tEmSi01V9Xb1xM0eQ5HdG9tbJqmzw0CX/pub?output=csv'; 
        const lienEquipes = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS8Y_nW7rxI_qmpjOFAfA_ajqmzq9beBImqjUN85CfDs0Hxq8aSk7zEq_BrFkMPPX2IhvbaJZusCHxN/pub?output=csv'; 

        const PTS_VICTOIRE = 4;
        const PTS_NUL = 2;
        const PTS_DEFAITE = 1;

        const LISTE_SPORTS = ["Football", "Handball", "Ultimate", "Basketball", "Pétanque", "Volleyball"];
        let toutesLesDonneesPoules = {};
        
        let joueursParEquipe = {}; 

        function convertirLienDrive(url) {
            if (!url || url.trim() === "") return "https://via.placeholder.com/150?text=Logo";
            const regex = /[-\w]{25,}/; 
            const match = url.match(regex);
            if (match) return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w200`; 
            return url; 
        }

        async function genererClassements() {
            const container = document.getElementById('classements-container');
            try {
                let dictionnaireEquipes = {}; 
                let dictionnaireLogos = {};

                try {
                    const repEquipes = await fetch(lienEquipes);
                    const csvEquipes = await repEquipes.text();
                    const lignesEquipes = csvEquipes.split('\n');
                    const sepEq = (lignesEquipes[0].split(';').length > lignesEquipes[0].split(',').length) ? ';' : ',';

                    for (let i = 1; i < lignesEquipes.length; i++) {
                        const cols = lignesEquipes[i].split(sepEq);
                        if (cols.length >= 3 && cols[0].trim() !== "") {
                            const nomEq = cols[0].trim();
                            const logoEq = convertirLienDrive(cols[1].trim());
                            const pouleEq = cols[2].trim().toUpperCase();

                            dictionnaireLogos[nomEq.toLowerCase()] = logoEq;

                            if (!dictionnaireEquipes[pouleEq]) dictionnaireEquipes[pouleEq] = [];
                            dictionnaireEquipes[pouleEq].push({ nom: nomEq, logo: logoEq });

                            const listeJoueurs = cols.slice(3).map(j => j.trim()).filter(j => j !== "");
                            joueursParEquipe[nomEq.toLowerCase()] = {
                                nom: nomEq,
                                logo: logoEq,
                                joueurs: listeJoueurs
                            };
                        }
                    }
                } catch (errLogos) { console.log("Erreur chargement équipes"); }

                function getLogo(nomEquipe) {
                    return dictionnaireLogos[nomEquipe.trim().toLowerCase()] || 'https://via.placeholder.com/150/f3f4f6/9ca3af?text=' + nomEquipe.charAt(0).toUpperCase();
                }

                toutesLesDonneesPoules = {};

                Object.keys(dictionnaireEquipes).forEach(nomPoule => {
                    const equipesDeLaPoule = dictionnaireEquipes[nomPoule];
                    toutesLesDonneesPoules[nomPoule] = { classement: {}, matchs: [] };

                    equipesDeLaPoule.forEach(eq => {
                        toutesLesDonneesPoules[nomPoule].classement[eq.nom] = { 
                            nom: eq.nom, pts: 0, joues: 0, victoires: 0, nuls: 0, defaites: 0, butsPour: 0, butsContre: 0, diff: 0,
                            logo: eq.logo
                        };
                    });

                    LISTE_SPORTS.forEach(sport => {
                        for (let i = 0; i < equipesDeLaPoule.length; i++) {
                            for (let j = i + 1; j < equipesDeLaPoule.length; j++) {
                                toutesLesDonneesPoules[nomPoule].matchs.push({
                                    sport: sport,
                                    eq1: equipesDeLaPoule[i].nom,
                                    eq2: equipesDeLaPoule[j].nom,
                                    logo1: equipesDeLaPoule[i].logo,
                                    logo2: equipesDeLaPoule[j].logo,
                                    score1Str: "", 
                                    score2Str: "", 
                                    matchJoue: false
                                });
                            }
                        }
                    });
                });

                const reponseScores = await fetch(lienScores);
                const csvScores = await reponseScores.text();
                const lignesScores = csvScores.split('\n');
                const separateurScores = (lignesScores[0].split(';').length > lignesScores[0].split(',').length) ? ';' : ',';

                for (let i = 1; i < lignesScores.length; i++) {
                    if (lignesScores[i].trim() === "") continue;
                    const cols = lignesScores[i].split(separateurScores);

                    if (cols.length >= 6 && cols[0].trim() !== "") {
                        
                    const sportSaisi = cols[0].trim();
                    const nomPouleSaisie = cols[2].trim().toUpperCase();
                    const eq1Saisie = cols[3].trim();
                    const score1StrSaisi = cols[4].trim();
                    const score2StrSaisi = cols[5].trim();
                    const eq2Saisie = cols[6].trim();

                        if (toutesLesDonneesPoules[nomPouleSaisie]) {
                            
                            let matchTrouve = toutesLesDonneesPoules[nomPouleSaisie].matchs.find(m => 
                                m.sport.toLowerCase() === sportSaisi.toLowerCase() &&
                                ((m.eq1.toLowerCase() === eq1Saisie.toLowerCase() && m.eq2.toLowerCase() === eq2Saisie.toLowerCase()) || 
                                 (m.eq1.toLowerCase() === eq2Saisie.toLowerCase() && m.eq2.toLowerCase() === eq1Saisie.toLowerCase()))
                            );

                            if (matchTrouve) {
                                const s1StrU = score1StrSaisi.toUpperCase();
                                const s2StrU = score2StrSaisi.toUpperCase();
                                
                                const isF1 = s1StrU === 'F';
                                const isF48_1 = s1StrU === 'F48' || s1StrU === 'F-48';
                                const isV1 = s1StrU === 'V';
                                
                                const isF2 = s2StrU === 'F';
                                const isF48_2 = s2StrU === 'F48' || s2StrU === 'F-48';
                                const isV2 = s2StrU === 'V';

                                const score1Num = parseInt(score1StrSaisi);
                                const score2Num = parseInt(score2StrSaisi);
                                
                                const matchEstJoue = (!isNaN(score1Num) && !isNaN(score2Num)) || isF1 || isF48_1 || isV1 || isF2 || isF48_2 || isV2;

                                if (matchEstJoue) {
                                    matchTrouve.matchJoue = true;
                                    
                                    let score1PourCalcul = score1StrSaisi;
                                    let score2PourCalcul = score2StrSaisi;
                                    
                                    if(matchTrouve.eq1.toLowerCase() !== eq1Saisie.toLowerCase()){
                                        matchTrouve.score1Str = score2StrSaisi;
                                        matchTrouve.score2Str = score1StrSaisi;
                                        score1PourCalcul = score2StrSaisi;
                                        score2PourCalcul = score1StrSaisi;
                                    } else {
                                        matchTrouve.score1Str = score1StrSaisi;
                                        matchTrouve.score2Str = score2StrSaisi;
                                    }

                                    let stat1 = toutesLesDonneesPoules[nomPouleSaisie].classement[matchTrouve.eq1];
                                    let stat2 = toutesLesDonneesPoules[nomPouleSaisie].classement[matchTrouve.eq2];

                                    if(stat1 && stat2){
                                        stat1.joues += 1; stat2.joues += 1;

                                        const calc_s1StrU = score1PourCalcul.toUpperCase();
                                        const calc_s2StrU = score2PourCalcul.toUpperCase();
                                        const calc_s1Num = parseInt(score1PourCalcul);
                                        const calc_s2Num = parseInt(score2PourCalcul);

                                        if (!isNaN(calc_s1Num) && !isNaN(calc_s2Num)) {
                                            stat1.butsPour += calc_s1Num; stat1.butsContre += calc_s2Num;
                                            stat2.butsPour += calc_s2Num; stat2.butsContre += calc_s1Num;

                                            if (calc_s1Num > calc_s2Num) {
                                                stat1.victoires += 1; stat1.pts += PTS_VICTOIRE;
                                                stat2.defaites += 1; stat2.pts += PTS_DEFAITE;
                                            } else if (calc_s2Num > calc_s1Num) {
                                                stat2.victoires += 1; stat2.pts += PTS_VICTOIRE;
                                                stat1.defaites += 1; stat1.pts += PTS_DEFAITE;
                                            } else {
                                                stat1.nuls += 1; stat1.pts += PTS_NUL;
                                                stat2.nuls += 1; stat2.pts += PTS_NUL;
                                            }
                                        } else {
                                            const calc_isF1 = calc_s1StrU === 'F';
                                            const calc_isF48_1 = calc_s1StrU === 'F48' || calc_s1StrU === 'F-48';
                                            const calc_isV1 = calc_s1StrU === 'V';
                                            const calc_isF2 = calc_s2StrU === 'F';
                                            const calc_isF48_2 = calc_s2StrU === 'F48' || calc_s2StrU === 'F-48';
                                            const calc_isV2 = calc_s2StrU === 'V';

                                            if (calc_isF1) { stat1.defaites += 1; stat1.pts += 0; }
                                            else if (calc_isF48_1) { stat1.defaites += 1; stat1.pts -= 2; }
                                            else if (calc_isV1 || (!isNaN(calc_s1Num) && calc_s1Num > 0)) {
                                                stat1.victoires += 1; stat1.pts += PTS_VICTOIRE;
                                                if (!isNaN(calc_s1Num)) stat1.butsPour += calc_s1Num; 
                                            }

                                            if (calc_isF2) { stat2.defaites += 1; stat2.pts += 0; }
                                            else if (calc_isF48_2) { stat2.defaites += 1; stat2.pts -= 2; }
                                            else if (calc_isV2 || (!isNaN(calc_s2Num) && calc_s2Num > 0)) {
                                                stat2.victoires += 1; stat2.pts += PTS_VICTOIRE;
                                                if (!isNaN(calc_s2Num)) stat2.butsPour += calc_s2Num;
                                            }
                                        }
                                        stat1.diff = stat1.butsPour - stat1.butsContre;
                                        stat2.diff = stat2.butsPour - stat2.butsContre;
                                    }
                                }
                            }
                        }
                    }
                }

                if (Object.keys(toutesLesDonneesPoules).length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">Aucune équipe trouvée. Remplissez l\'onglet Équipes.</p>';
                    return;
                }

                const selectMenu = document.getElementById('filtre-poule');
                Object.keys(toutesLesDonneesPoules).sort().forEach(nomPoule => {
                    selectMenu.innerHTML += `<option value="${nomPoule}">Poule ${nomPoule}</option>`;
                });

                const urlParams = new URLSearchParams(window.location.search);
                const pouleDemandee = urlParams.get('poule');
                
                if (pouleDemandee && toutesLesDonneesPoules[pouleDemandee]) {
                    selectMenu.value = pouleDemandee;
                }

                afficherPoules();

            } catch (e) {
                console.error(e);
                container.innerHTML = '<p class="text-center text-red-500 font-bold">Erreur de chargement.</p>';
            }
        }

        function afficherPoules() {
            const container = document.getElementById('classements-container');
            const pouleChoisie = document.getElementById('filtre-poule').value;
            container.innerHTML = ''; 

            Object.keys(toutesLesDonneesPoules).sort().forEach(nomPoule => {
                
                if (pouleChoisie !== 'Toutes' && nomPoule !== pouleChoisie) return;

                const poule = toutesLesDonneesPoules[nomPoule];
                
                const classementTrie = Object.values(poule.classement).sort((a, b) => {
                    if (b.pts !== a.pts) return b.pts - a.pts;
                    return b.diff - a.diff;
                });

                let htmlTableau = '';
                classementTrie.forEach((eq, index) => {
                    const isFirst = index === 0;
                    htmlTableau += `
                        <tr class="border-b border-gray-100 last:border-0 ${isFirst ? 'bg-orange-50/50' : ''} cursor-pointer hover:bg-gray-100 transition-colors" onclick="ouvrirModalEquipe(\`${eq.nom}\`)">
                            <td class="py-3 px-3 text-center text-gray-400 font-bold">${index + 1}</td>
                            <td class="py-3 px-2 text-left">
                                <div class="flex items-center space-x-3">
                                    <img src="${eq.logo}" class="w-12 h-12 rounded-full object-cover border border-gray-200 bg-white shadow-sm flex-shrink-0" onerror="this.src='https://via.placeholder.com/150/f3f4f6/9ca3af?text=${eq.nom.charAt(0)}'">
                                    <span class="font-bold text-bleu-nuit uppercase truncate">${eq.nom}</span>
                                </div>
                            </td>
                            <td class="py-3 px-2 text-center font-bold text-lg text-or">${eq.pts}</td>
                            <td class="py-3 px-2 text-center text-gray-500 text-xs">${eq.joues}</td>
                            <td class="py-3 px-2 text-center text-gray-500 text-xs hidden sm:table-cell">${eq.victoires}</td>
                            <td class="py-3 px-2 text-center text-gray-500 text-xs hidden sm:table-cell">${eq.nuls}</td>
                            <td class="py-3 px-2 text-center text-gray-500 text-xs hidden sm:table-cell">${eq.defaites}</td>
                            <td class="py-3 px-2 text-center font-bold text-xs ${eq.diff > 0 ? 'text-green-500' : (eq.diff < 0 ? 'text-red-500' : 'text-gray-500')}">${eq.diff > 0 ? '+'+eq.diff : eq.diff}</td>
                        </tr>
                    `;
                });

                let matchsParSport = {};
                poule.matchs.forEach(match => {
                    let sportCle = match.sport || "Autres";
                    if (!matchsParSport[sportCle]) matchsParSport[sportCle] = [];
                    matchsParSport[sportCle].push(match);
                });

                let htmlAccordions = '';
                
                LISTE_SPORTS.forEach(sport => {
                    if(!matchsParSport[sport]) return; 
                    
                    let htmlMatchs = '';
                    matchsParSport[sport].forEach(match => {
                        let affichageCentral = '';
                        if (match.matchJoue) {
                            affichageCentral = `<div class="bg-bleu-nuit text-white font-bold px-4 py-2 rounded-lg flex items-center justify-center min-w-[70px] md:min-w-[80px] text-sm md:text-lg shadow-sm tracking-widest">${match.score1Str} - ${match.score2Str}</div>`;
                        } else {
                            affichageCentral = `<div class="bg-gray-100 text-gray-400 text-[9px] md:text-[10px] font-bold px-2 md:px-3 py-1.5 md:py-2 rounded-lg flex flex-col items-center justify-center min-w-[70px] md:min-w-[80px] uppercase border border-dashed border-gray-300 leading-tight">À JOUER</div>`;
                        }

                        // 🌟 LE NOUVEAU DESIGN LIGUE DES CHAMPIONS EST ICI 🌟
                        htmlMatchs += `
                            <div class="flex items-center justify-between py-4 border-b border-gray-100/50 last:border-0 hover:bg-gray-50 px-1 md:px-2 transition-colors">
                                <!-- Équipe 1 (Gauche) -->
                                <div class="w-1/3 flex flex-col items-center justify-center cursor-pointer hover:opacity-70 transition-opacity" onclick="ouvrirModalEquipe(\`${match.eq1}\`)">
                                    <img src="${match.logo1}" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover border border-gray-200 bg-white shadow-sm mb-1" onerror="this.style.display='none'">
                                    <span class="font-bold text-[10px] md:text-xs text-gray-800 text-center leading-tight line-clamp-2 uppercase">${match.eq1}</span>
                                </div>
                                
                                <!-- Centre (Bouton) -->
                                <div class="w-1/3 flex justify-center flex-shrink-0 z-10 px-1">
                                    ${affichageCentral}
                                </div>
                                
                                <!-- Équipe 2 (Droite) -->
                                <div class="w-1/3 flex flex-col items-center justify-center cursor-pointer hover:opacity-70 transition-opacity" onclick="ouvrirModalEquipe(\`${match.eq2}\`)">
                                    <img src="${match.logo2}" class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover border border-gray-200 bg-white shadow-sm mb-1" onerror="this.style.display='none'">
                                    <span class="font-bold text-[10px] md:text-xs text-gray-800 text-center leading-tight line-clamp-2 uppercase">${match.eq2}</span>
                                </div>
                            </div>
                        `;
                    });

                    htmlAccordions += `
                        <details class="mb-3 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden group">
                            <summary class="p-4 font-bold text-bleu-nuit cursor-pointer outline-none uppercase tracking-widest text-sm flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition-colors">
                                <span class="flex items-center gap-2">Résultats : ${sport}</span>
                                <span class="text-or text-xl arrow-icon transition-transform duration-300">▼</span>
                            </summary>
                            <div class="p-2 border-t border-gray-100 bg-white">
                                ${htmlMatchs}
                            </div>
                        </details>
                    `;
                });

                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                        <div class="bg-gray-100 text-gray-600 p-3 text-sm font-bold uppercase tracking-widest border-b border-gray-200">
                            Poule ${nomPoule}
                        </div>
                        
                        <div class="overflow-x-auto mb-6">
                            <table class="w-full text-sm">
                                <thead class="text-gray-400 text-[10px] uppercase border-b border-gray-100">
                                    <tr>
                                        <th class="py-2 px-3 w-8 text-center font-medium">#</th>
                                        <th class="py-2 px-2 text-left font-medium">Équipe</th>
                                        <th class="py-2 px-2 text-center font-bold text-gray-600">Pts</th>
                                        <th class="py-2 px-2 text-center font-medium" title="Matchs Joués">J</th>
                                        <th class="py-2 px-2 text-center font-medium hidden sm:table-cell" title="Victoires">V</th>
                                        <th class="py-2 px-2 text-center font-medium hidden sm:table-cell" title="Nuls">N</th>
                                        <th class="py-2 px-2 text-center font-medium hidden sm:table-cell" title="Défaites">D</th>
                                        <th class="py-2 px-2 text-center font-medium" title="Différence">Diff</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${htmlTableau}
                                </tbody>
                            </table>
                        </div>

                        <div class="px-2 pb-2">
                            ${htmlAccordions}
                        </div>
                    </div>
                `;
            });
        }

        function ouvrirModalEquipe(nom) {
            const eqData = joueursParEquipe[nom.toLowerCase()];
            if (!eqData) return;

            document.getElementById('modal-equipe-nom').innerText = eqData.nom;
            const logoImg = document.getElementById('modal-equipe-logo');
            logoImg.src = eqData.logo;
            logoImg.style.display = 'block';

            const listeContainer = document.getElementById('liste-joueurs-equipe');
            listeContainer.innerHTML = '';

            if (eqData.joueurs.length === 0) {
                listeContainer.innerHTML = '<p class="text-gray-500 text-sm italic col-span-2">Aucun joueur renseigné.</p>';
            } else {
                eqData.joueurs.forEach(joueur => {
                    const sousJoueurs = joueur.split(',').map(j => j.trim()).filter(j => j !== "");
                    sousJoueurs.forEach(subJ => {
                        listeContainer.innerHTML += `
                            <li class="bg-white p-3 rounded-lg border border-gray-200 shadow-sm flex items-center space-x-3">
                                <span class="text-xl bg-orange-50 w-8 h-8 rounded-full flex items-center justify-center text-or border border-orange-100">👤</span>
                                <span class="font-bold text-gray-700 text-sm">${subJ}</span>
                            </li>
                        `;
                    });
                });
            }
            
            document.getElementById('modal-equipe').classList.remove('hidden');
        }

        function fermerModalEquipe() {
            document.getElementById('modal-equipe').classList.add('hidden');
        }

        document.getElementById('modal-equipe').addEventListener('click', function(e) {
            if (e.target === this) fermerModalEquipe();
        });

        genererClassements();
    </script>
</body>
</html>
