<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intr'Aladin - Phases Finales</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bleu-nuit': '#0B132B', 'or': '#F59E0B' },
                    fontFamily: { 'aladin': ['"Aladin"', 'cursive'], 'sans': ['ui-sans-serif', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-32 md:pb-0 font-sans">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-bleu-nuit to-indigo-900 text-white p-4 flex justify-between items-center rounded-b-3xl md:rounded-none shadow-md">
        <img src="logo intra.png" alt="Logo Intras" class="w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
        <div class="text-center">
            <h1 class="text-4xl font-aladin tracking-widest text-or mt-2">INTR'ALADIN</h1>
            <p class="text-xs text-gray-300">Résultats du tournoi</p>
        </div>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
            <a href="index.html" class="hover:text-or transition-colors">Accueil</a>
            <a href="planning.html" class="hover:text-or transition-colors">Planning</a>
            <a href="equipes.html" class="hover:text-or transition-colors">Équipes</a>
            <a href="staff.html" class="hover:text-or transition-colors">Staff</a>
            <a href="phases-finales.html" class="text-or">Scores</a>
        </div>
        <img src="logo_mads.png" alt="Logo Mads" class="md:hidden w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
    </header>

    <main class="p-4 mt-4 space-y-4 max-w-4xl mx-auto">
        
        <!-- ONGLETS POULES / FINALES -->
        <div class="flex justify-center mb-4">
            <div class="bg-gray-200 rounded-xl p-1 inline-flex w-full max-w-sm shadow-inner">
                <a href="classements.html" class="flex-1 text-center py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors">📊 Poules</a>
                <a href="phases-finales.html" class="flex-1 text-center py-2 rounded-lg text-sm font-bold bg-white text-bleu-nuit shadow-sm transition-all pointer-events-none">🔥 Finales</a>
            </div>
        </div>

        <!-- SÉLECTION DU SPORT -->
        <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                <h2 class="font-bold text-xl text-bleu-nuit flex items-center gap-2 uppercase tracking-wide">
                    Tableau Final
                </h2>
                <select id="filtre-sport" onchange="changerSport()" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm font-bold rounded-lg focus:ring-or focus:border-or block w-full md:w-auto p-2.5">
                    <!-- Options injectées en JS -->
                </select>
            </div>
        </section>

        <!-- ZONE D'AFFICHAGE DU TABLEAU (Style L'Équipe) -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            
            <!-- EN-TÊTE DU TOUR (Navigation) -->
            <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-gray-50">
                <h3 id="titre-phase" class="font-bold text-gray-800 text-lg">Chargement...</h3>
                <div class="text-xs text-blue-600 font-semibold space-x-2 flex">
                    <button id="btn-prev" onclick="phasePrecedente()" class="hover:underline opacity-50 cursor-not-allowed">tour préc.</button>
                    <span class="text-gray-300">|</span>
                    <button id="btn-next" onclick="phaseSuivante()" class="hover:underline opacity-50 cursor-not-allowed">tour suiv.</button>
                </div>
            </div>

            <!-- LISTE DES MATCHS -->
            <div id="matchs-container" class="p-4 space-y-4">
                <p class="text-center text-gray-400 animate-pulse">Recherche des matchs...</p>
            </div>
            
        </section>
    </main>

    <!-- BARRE DE NAVIGATION MOBILE -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🏠</span><span class="text-[10px] mt-1">ACCUEIL</span></a>
        <a href="planning.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">📅</span><span class="text-[10px] mt-1">PLANNING</span></a>
        <a href="equipes.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">👥</span><span class="text-[10px] mt-1">ÉQUIPES</span></a>
        <a href="staff.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🦺</span><span class="text-[10px] mt-1">STAFF</span></a>
        <a href="phases-finales.html" class="flex flex-col items-center text-or"><span class="text-xl">🏆</span><span class="text-[10px] font-bold mt-1 uppercase">SCORES</span></a>    
    </nav>

    <script>
        // 🚨 TON LIEN CSV DES PHASES FINALES (Avec au moins les colonnes : Sport, Phase, DateHeure, Eq1, Score1, Score2, Eq2, Lieu, Arbitre)
        const lienGoogleSheetFinales = '';

        let tousLesMatchs = [];
        let phasesDuSportActuel = [];
        let indexPhaseActuelle = 0;

        // Ordre logique pour trier les phases automatiquement
        const motsClefsOrdre = ["huit", "quart", "demi", "petite", "3e", "final"];

        function getPoidsPhase(phaseStr) {
            const p = phaseStr.toLowerCase();
            for(let i = 0; i < motsClefsOrdre.length; i++) {
                if (p.includes(motsClefsOrdre[i])) returhttps://docs.google.com/spreadsheets/d/e/2PACX-1vRkfcixZivZwH0COYSFMlB9EnLI6D0vdbGgL3nA0jXhuWe-hOd8kdBX_iSx6cjwKIMXSebeRdq7pURT/pubhtmln i;
            }
            return 99; // Si on ne reconnaît pas le mot, on le met à la fin
        }

        function traduireEmojiEnSport(texte) {
            if (!texte) return "";
            if (texte.includes("🏀")) return "Basketball";
            if (texte.includes("🤾")) return "Handball";
            if (texte.includes("⚽")) return "Football";
            if (texte.includes("🥏")) return "Ultimate";
            if (texte.includes("🏐")) return "Volleyball";
            if (texte.includes("🥎") || texte.includes("☀️") || texte.includes("🎯")) return "Pétanque";
            return texte.trim();
        }

        async function chargerMatchs() {
            try {
                const reponse = await fetch(lienGoogleSheetFinales);
                const donneesBrutes = await reponse.text();
                const lignes = donneesBrutes.split('\n');
                
                tousLesMatchs = []; 
                let sportsDisponibles = new Set();

                for (let i = 1; i < lignes.length; i++) {
                    const colonnes = lignes[i].split(',');
                    // Vérification sur 7 colonnes minimum, on adapte si Lieu et Arbitre manquent
                    if (colonnes.length >= 7 && colonnes[0].trim() !== "") { 
                        const sportBrut = colonnes[0].trim();
                        const match = {
                            sportClean: traduireEmojiEnSport(sportBrut),
                            phase: colonnes[1] ? colonnes[1].trim() : "Phase Finale",
                            dateHeure: colonnes[2] ? colonnes[2].trim() : "",
                            eq1: colonnes[3] ? colonnes[3].trim() : "À définir", 
                            score1: colonnes[4] ? colonnes[4].trim() : "", 
                            score2: colonnes[5] ? colonnes[5].trim() : "",
                            eq2: colonnes[6] ? colonnes[6].trim() : "À définir",
                            lieu: colonnes[7] ? colonnes[7].trim() : "", 
                            arbitre: colonnes[8] ? colonnes[8].trim() : ""
                        };
                        tousLesMatchs.push(match);
                        sportsDisponibles.add(match.sportClean);
                    }
                }

                // Remplir le menu déroulant des sports
                const selectSport = document.getElementById('filtre-sport');
                Array.from(sportsDisponibles).sort().forEach(sport => { 
                    selectSport.innerHTML += `<option value="${sport}">${sport}</option>`; 
                });

                changerSport();

            } catch (erreur) {
                document.getElementById('matchs-container').innerHTML = '<p class="text-red-500 text-center font-bold">Le fichier des phases finales est introuvable.</p>';
            }
        }

        function changerSport() {
            const sportChoisi = document.getElementById('filtre-sport').value;
            
            // Extraire tous les matchs du sport sélectionné
            const matchsDuSport = tousLesMatchs.filter(m => m.sportClean === sportChoisi);
            
            // Trouver toutes les phases uniques pour ce sport
            phasesDuSportActuel = [...new Set(matchsDuSport.map(m => m.phase))];
            
            // Trier les phases dans le bon ordre (Quart -> Demi -> Finale)
            phasesDuSportActuel.sort((a, b) => getPoidsPhase(a) - getPoidsPhase(b));

            // On se met sur la première phase par défaut (ex: Quarts de finale)
            indexPhaseActuelle = 0; 
            afficherPhaseActuelle();
        }

        function phasePrecedente() {
            if (indexPhaseActuelle > 0) {
                indexPhaseActuelle--;
                afficherPhaseActuelle();
            }
        }

        function phaseSuivante() {
            if (indexPhaseActuelle < phasesDuSportActuel.length - 1) {
                indexPhaseActuelle++;
                afficherPhaseActuelle();
            }
        }

        function afficherPhaseActuelle() {
            const container = document.getElementById('matchs-container');
            const titre = document.getElementById('titre-phase');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            const sportChoisi = document.getElementById('filtre-sport').value;

            if (phasesDuSportActuel.length === 0) {
                titre.innerText = "Aucun match";
                container.innerHTML = '<p class="text-center text-gray-500 py-8">L\'arbre n\'est pas encore défini pour ce sport.</p>';
                return;
            }

            const nomPhase = phasesDuSportActuel[indexPhaseActuelle];
            titre.innerText = nomPhase;

            // Gérer l'apparence des boutons Précédent/Suivant
            btnPrev.className = indexPhaseActuelle === 0 ? "text-gray-400 cursor-not-allowed" : "text-blue-600 hover:underline cursor-pointer";
            btnNext.className = indexPhaseActuelle === phasesDuSportActuel.length - 1 ? "text-gray-400 cursor-not-allowed" : "text-blue-600 hover:underline cursor-pointer";

            // Récupérer les matchs de cette phase
            const matchsDeLaPhase = tousLesMatchs.filter(m => m.sportClean === sportChoisi && m.phase === nomPhase);
            container.innerHTML = '';

            matchsDeLaPhase.forEach(match => {
                // Déterminer qui a gagné pour mettre en gras (Design L'Équipe)
                const s1 = parseInt(match.score1);
                const s2 = parseInt(match.score2);
                let eq1Bold = "font-bold text-gray-800";
                let eq2Bold = "font-bold text-gray-800";
                let eq1ScoreBold = "font-bold text-gray-800";
                let eq2ScoreBold = "font-bold text-gray-800";
                
                // Opacité du petit carré couleur à gauche
                let eq1Carre = "bg-or";
                let eq2Carre = "bg-bleu-nuit";

                if (!isNaN(s1) && !isNaN(s2)) {
                    if (s1 > s2) {
                        eq2Bold = "text-gray-500"; eq2ScoreBold = "text-gray-500"; eq2Carre = "bg-gray-300";
                    } else if (s2 > s1) {
                        eq1Bold = "text-gray-500"; eq1ScoreBold = "text-gray-500"; eq1Carre = "bg-gray-300";
                    }
                }

                // Gérer les scores vides
                const affScore1 = match.score1 !== "" ? match.score1 : "-";
                const affScore2 = match.score2 !== "" ? match.score2 : "-";

                const infosSupp = [match.dateHeure, match.lieu, match.arbitre ? `Arbitre: ${match.arbitre}` : ""].filter(Boolean).join(" • ");

                const carteHTML = `
                    <div class="bg-gray-100 p-3 rounded-lg relative border border-gray-200/60 shadow-sm flex flex-col justify-center min-h-[90px]">
                        <!-- Équipe 1 -->
                        <div class="flex items-center justify-between mb-2">
                            <div class="flex items-center space-x-2 truncate pr-2">
                                <div class="w-1.5 h-4 ${eq1Carre} rounded-sm flex-shrink-0"></div>
                                <span class="${eq1Bold} text-sm md:text-base truncate">${match.eq1}</span>
                            </div>
                            <div class="${eq1ScoreBold} text-sm md:text-base flex-shrink-0 ml-2 w-6 text-right">${affScore1}</div>
                        </div>
                        
                        <!-- Équipe 2 -->
                        <div class="flex items-center justify-between">
                            <div class="flex items-center space-x-2 truncate pr-2">
                                <div class="w-1.5 h-4 ${eq2Carre} rounded-sm flex-shrink-0"></div>
                                <span class="${eq2Bold} text-sm md:text-base truncate">${match.eq2}</span>
                            </div>
                            <div class="${eq2ScoreBold} text-sm md:text-base flex-shrink-0 ml-2 w-6 text-right">${affScore2}</div>
                        </div>

                        <!-- Infos date/lieu en bas à droite -->
                        <div class="text-[10px] text-gray-400 mt-2.5 pt-1.5 border-t border-gray-200/80 text-right uppercase tracking-wider font-semibold">
                            ${infosSupp}
                        </div>
                    </div>
                `;
                container.innerHTML += carteHTML;
            });
        }

        chargerMatchs();
    </script>
</body>
</html>
