<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intr'Aladin - Phases Finales</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aladin&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'bleu-nuit': '#0B132B', 'or': '#F59E0B' },
                    fontFamily: { 'aladin': ['"Aladin"', 'cursive'], 'sans': ['ui-sans-serif', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-32 md:pb-0 font-sans">

    <!-- HEADER -->
    <header class="bg-gradient-to-r from-bleu-nuit to-indigo-900 text-white p-4 flex justify-between items-center rounded-b-3xl md:rounded-none shadow-md">
        <img src="logo intra.png" alt="Logo Intras" class="w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
        <div class="text-center">
            <h1 class="text-4xl font-aladin tracking-widest text-or mt-2">INTR'ALADIN</h1>
            <p class="text-xs text-gray-300">Résultats du tournoi</p>
        </div>
        <div class="hidden md:flex space-x-6 font-bold text-sm items-center">
            <a href="index.html" class="hover:text-or transition-colors">Accueil</a>
            <a href="planning.html" class="hover:text-or transition-colors">Planning</a>
            <a href="equipes.html" class="hover:text-or transition-colors">Équipes</a>
            <a href="staff.html" class="hover:text-or transition-colors">Staff</a>
            <a href="phases-finales.html" class="text-or">Scores</a>
        </div>
        <img src="logo_mads.png" alt="Logo Mads" class="md:hidden w-12 h-12 rounded-full object-cover border border-white/30 bg-gray-200/20">
    </header>

    <main class="p-4 mt-4 space-y-4 max-w-4xl mx-auto">
        
        <!-- ONGLETS POULES / FINALES -->
        <div class="flex justify-center mb-4">
            <div class="bg-gray-200 rounded-xl p-1 inline-flex w-full max-w-sm shadow-inner">
                <a href="classements.html" class="flex-1 text-center py-2 rounded-lg text-sm font-bold text-gray-500 hover:text-gray-700 transition-colors">📊 Poules</a>
                <a href="phases-finales.html" class="flex-1 text-center py-2 rounded-lg text-sm font-bold bg-white text-bleu-nuit shadow-sm transition-all pointer-events-none">🔥 Finales</a>
            </div>
        </div>

        <!-- ZONE D'AFFICHAGE DU TABLEAU (BRACKET) -->
        <section class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            
            <div class="flex justify-between items-center p-4 border-b border-gray-200 bg-gray-50">
                <h3 id="titre-phase" class="font-bold text-gray-800 text-lg uppercase tracking-wide">Chargement...</h3>
                <div class="text-xs text-blue-600 font-semibold space-x-2 flex">
                    <button id="btn-prev" onclick="phasePrecedente()" class="hover:underline opacity-50 cursor-not-allowed">tour préc.</button>
                    <span class="text-gray-300">|</span>
                    <button id="btn-next" onclick="phaseSuivante()" class="hover:underline opacity-50 cursor-not-allowed">tour suiv.</button>
                </div>
            </div>

            <div id="matchs-container" class="p-4 bg-gray-50/50">
                <p class="text-center text-gray-400 animate-pulse">Recherche des matchs...</p>
            </div>
            
        </section>
    </main>

    <!-- BARRE DE NAVIGATION MOBILE -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 pb-6 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🏠</span><span class="text-[10px] mt-1">ACCUEIL</span></a>
        <a href="planning.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">📅</span><span class="text-[10px] mt-1">PLANNING</span></a>
        <a href="equipes.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">👥</span><span class="text-[10px] mt-1">ÉQUIPES</span></a>
        <a href="staff.html" class="flex flex-col items-center text-gray-400 hover:text-bleu-nuit"><span class="text-xl">🦺</span><span class="text-[10px] mt-1">STAFF</span></a>
        <a href="phases-finales.html" class="flex flex-col items-center text-or"><span class="text-xl">🏆</span><span class="text-[10px] font-bold mt-1 uppercase">SCORES</span></a>    
    </nav>

    <script>
        // 🚨 TON LIEN CSV DES PHASES FINALES ICI 🚨
        const lienGoogleSheetFinales = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRkfcixZivZwH0COYSFMlB9EnLI6D0vdbGgL3nA0jXhuWe-hOd8kdBX_iSx6cjwKIMXSebeRdq7pURT/pub?output=csv';

        let tousLesMatchs = [];
        let phasesDisponibles = [];
        let indexPhaseActuelle = 0;

        const motsClefsOrdre = ["16e", "8e", "huit", "quart", "demi", "petite", "3e", "final"];

        function getPoidsPhase(phaseStr) {
            const p = phaseStr.toLowerCase();
            for(let i = 0; i < motsClefsOrdre.length; i++) {
                if (p.includes(motsClefsOrdre[i])) return i;
            }
            return 99; 
        }

        function parserCSVSuperRobuste(texte) {
            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;
            let sep = texte.indexOf(';') > -1 && texte.indexOf(';') < texte.indexOf('\n') ? ';' : ',';
            for (l of texte) {
                if ('"' === l) {
                    if (s && l === p) row[i] += l;
                    s = !s;
                } else if (sep === l && s) l = row[++i] = '';
                else if ('\n' === l && s) {
                    if ('\r' === p) row[i] = row[i].slice(0, -1);
                    row = ret[++r] = [l = '']; i = 0;
                } else row[i] += l;
                p = l;
            }
            return ret;
        }

        async function chargerMatchs() {
            try {
                const reponse = await fetch(lienGoogleSheetFinales);
                const donneesBrutes = await reponse.text();
                const lignes = parserCSVSuperRobuste(donneesBrutes);
                
                tousLesMatchs = []; 
                let setPhases = new Set();

                for (let i = 1; i < lignes.length; i++) {
                    const colonnes = lignes[i];
                    
                    if (colonnes.length >= 7 && colonnes[1] && colonnes[1].trim() !== "") { 
                        const match = {
                            detailsScores: colonnes[0] ? colonnes[0].trim() : "", 
                            phase: colonnes[1].trim(),
                            dateHeure: colonnes[2] ? colonnes[2].trim() : "",
                            eq1: colonnes[3] ? colonnes[3].trim() : "À définir", 
                            score1: colonnes[4] ? colonnes[4].trim() : "", 
                            score2: colonnes[5] ? colonnes[5].trim() : "",
                            eq2: colonnes[6] ? colonnes[6].trim() : "À définir",
                            lieu: colonnes[7] ? colonnes[7].trim() : "", 
                            arbitre: colonnes[8] ? colonnes[8].trim() : ""
                        };
                        tousLesMatchs.push(match);
                        setPhases.add(match.phase);
                    }
                }

                phasesDisponibles = Array.from(setPhases);
                phasesDisponibles.sort((a, b) => getPoidsPhase(a) - getPoidsPhase(b));

                if (phasesDisponibles.length > 0) {
                    indexPhaseActuelle = 0;
                    afficherPhaseActuelle();
                } else {
                    document.getElementById('matchs-container').innerHTML = '<p class="text-center text-gray-500 py-8">Aucun match trouvé. Vérifiez le lien CSV.</p>';
                }

            } catch (erreur) {
                console.error(erreur);
                document.getElementById('matchs-container').innerHTML = '<p class="text-red-500 text-center font-bold">Erreur de lecture du fichier.</p>';
            }
        }

        function phasePrecedente() {
            if (indexPhaseActuelle > 0) {
                indexPhaseActuelle--;
                afficherPhaseActuelle();
            }
        }

        function phaseSuivante() {
            if (indexPhaseActuelle < phasesDisponibles.length - 1) {
                indexPhaseActuelle++;
                afficherPhaseActuelle();
            }
        }

        function creerCarteMatch(match) {
            const affScore1 = match.score1.trim() !== "" ? match.score1 : "-";
            const affScore2 = match.score2.trim() !== "" ? match.score2 : "-";
            
            let eq1Bold = "text-gray-800";
            let eq2Bold = "text-gray-800";
            let s1Bold = "text-gray-800";
            let s2Bold = "text-gray-800";
            let eq1Color = "bg-or";
            let eq2Color = "bg-bleu-nuit";

            // Calcul du vainqueur
            const numS1 = parseInt(affScore1);
            const numS2 = parseInt(affScore2);
            if (!isNaN(numS1) && !isNaN(numS2)) {
                if (numS1 > numS2) {
                    eq1Bold = "font-bold text-gray-800"; s1Bold = "font-bold text-gray-800";
                    eq2Bold = "font-medium text-gray-500"; s2Bold = "font-medium text-gray-500";
                    eq2Color = "bg-gray-300";
                } else if (numS2 > numS1) {
                    eq2Bold = "font-bold text-gray-800"; s2Bold = "font-bold text-gray-800";
                    eq1Bold = "font-medium text-gray-500"; s1Bold = "font-medium text-gray-500";
                    eq1Color = "bg-gray-300";
                }
            } else {
                eq1Bold = "font-bold text-gray-800"; eq2Bold = "font-bold text-gray-800";
                s1Bold = "font-bold text-gray-800"; s2Bold = "font-bold text-gray-800";
            }

            // 🚀 NOUVEAU : Transformation des lignes (Alt+Entrée) en petits badges côte à côte
            let affichageDetails = '';
            if (match.detailsScores) {
                const lignesScores = match.detailsScores.split('\n'); // Découpe chaque ligne
                
                // On transforme chaque ligne en un petit "badge" arrondi et on les met côte à côte
                const badges = lignesScores.filter(l => l.trim() !== '').map(l => 
                    `<span class="inline-flex items-center bg-gray-100 border border-gray-200 text-gray-700 px-1.5 py-0.5 rounded text-[10px] sm:text-xs font-semibold whitespace-nowrap">${l.trim()}</span>`
                ).join('');
                
                // flex-wrap permet de les aligner horizontalement, avec un petit espace (gap) entre eux
                affichageDetails = `<div class="flex flex-wrap gap-1.5">${badges}</div>`;
            }

            const infosSupp = [match.dateHeure, match.lieu].filter(Boolean).join(" • ");

            return `
                <div class="bg-white p-2.5 rounded-lg border border-gray-200 shadow-sm flex flex-col justify-between min-h-[5.5rem] w-full">
                    
                    <!-- HAUT : Noms des équipes et Scores Globaux -->
                    <div class="flex flex-col space-y-1.5 w-full">
                        <div class="flex justify-between items-center w-full">
                            <div class="flex items-start space-x-1.5 min-w-0 pr-2">
                                <div class="w-1.5 h-3.5 ${eq1Color} rounded-sm flex-shrink-0 mt-0.5"></div>
                                <span class="${eq1Bold} text-[10px] sm:text-xs leading-tight break-words">${match.eq1}</span>
                            </div>
                            <div class="${s1Bold} text-[11px] sm:text-xs text-right w-6 flex-shrink-0">${affScore1}</div>
                        </div>
                        
                        <div class="flex justify-between items-center w-full">
                            <div class="flex items-start space-x-1.5 min-w-0 pr-2">
                                <div class="w-1.5 h-3.5 ${eq2Color} rounded-sm flex-shrink-0 mt-0.5"></div>
                                <span class="${eq2Bold} text-[10px] sm:text-xs leading-tight break-words">${match.eq2}</span>
                            </div>
                            <div class="${s2Bold} text-[11px] sm:text-xs text-right w-6 flex-shrink-0">${affScore2}</div>
                        </div>
                    </div>
                    
                    <!-- BAS : Détails sports (Badges alignés) et Date -->
                    <div class="mt-2.5 pt-2 border-t border-gray-100 flex justify-between items-center gap-2 w-full">
                        <div class="flex-1 pr-2">
                            ${affichageDetails}
                        </div>
                        <div class="text-[8px] text-gray-400 uppercase tracking-wider font-semibold text-right flex-shrink-0">
                            ${infosSupp}
                        </div>
                    </div>
                </div>
            `;
        }

        function afficherPhaseActuelle() {
            const container = document.getElementById('matchs-container');
            const titre = document.getElementById('titre-phase');
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');

            if (phasesDisponibles.length === 0) return;

            const nomPhase = phasesDisponibles[indexPhaseActuelle];
            titre.innerText = nomPhase;

            btnPrev.className = indexPhaseActuelle === 0 ? "text-gray-400 cursor-not-allowed" : "text-blue-600 hover:underline cursor-pointer";
            btnNext.className = indexPhaseActuelle === phasesDisponibles.length - 1 ? "text-gray-400 cursor-not-allowed" : "text-blue-600 hover:underline cursor-pointer";

            const matchsDeLaPhase = tousLesMatchs.filter(m => m.phase === nomPhase);
            let html = '';

            for (let i = 0; i < matchsDeLaPhase.length; i += 2) {
                const m1 = matchsDeLaPhase[i];
                const m2 = matchsDeLaPhase[i+1];

                if (m2) {
                    html += `
                    <div class="flex mb-8 w-full">
                        <div class="w-6/12 sm:w-5/12 flex flex-col justify-between space-y-4 relative z-10">
                            ${creerCarteMatch(m1)}
                            ${creerCarteMatch(m2)}
                        </div>
                        
                        <div class="w-1/12 sm:w-2/12 relative flex-shrink-0">
                            <div class="absolute top-[25%] bottom-[25%] left-0 w-1/2 border-t-2 border-b-2 border-r-2 border-gray-300 rounded-r-lg"></div>
                            <div class="absolute top-[50%] left-[50%] right-0 border-t-2 border-gray-300"></div>
                        </div>
                        
                        <div class="w-5/12 flex flex-col justify-center pl-1">
                            <div class="bg-gray-200/50 border border-gray-200/80 p-2 rounded-lg text-center flex flex-col justify-center items-center min-h-[4rem] shadow-inner">
                                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Tour suivant</span>
                                <span class="text-gray-400 font-bold mt-1">-</span>
                            </div>
                        </div>
                    </div>
                    `;
                } else {
                    html += `
                    <div class="flex justify-center mb-8 w-full">
                        <div class="w-10/12 md:w-2/3">
                            ${creerCarteMatch(m1)}
                        </div>
                    </div>
                    `;
                }
            }

            container.innerHTML = html;
        }

        chargerMatchs();
    </script>
</body>
</html>
